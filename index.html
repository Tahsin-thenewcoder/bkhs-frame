<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKHS Eid Reunion - Frame Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        canvas { touch-action: none; cursor: grab; }
        /* Modal Style */
        #downloadModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="downloadModal" onclick="closeModal()">
        <div class="text-center max-w-sm" onclick="event.stopPropagation()">
            <p class="text-white text-lg mb-4">নিচের ছবির ওপর <span class="text-yellow-400 font-bold underline">চেপে ধরুন (Long Press)</span>, তারপর <span class="text-green-400 font-bold">"Download Image"</span> বা <span class="text-green-400 font-bold">"Save"</span> চাপুন।</p>
            <div id="imageContainer" class="bg-white p-2 rounded-lg shadow-2xl mb-6">
                </div>
            <button onclick="closeModal()" class="w-full bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg">ফিরে যান</button>
        </div>
    </div>

    <div class="glass-panel max-w-lg w-full rounded-3xl shadow-2xl p-6 md:p-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">BKHS Eid Reunion <span class="text-blue-600">2026</span></h1>
        <p class="text-gray-500 mb-6 text-sm">ছবি সাজিয়ে "সেভ করুন" বাটনে ক্লিক করুন</p>

        <div class="relative w-full aspect-square bg-gray-100 rounded-2xl overflow-hidden border-2 border-dashed border-gray-300 flex items-center justify-center mb-6">
            <p id="placeholder-text" class="text-gray-400 font-medium z-10">এখানে ছবি দেখা যাবে</p>
            <canvas id="canvas" class="absolute top-0 left-0 w-full h-full hidden z-20"></canvas>
            <input type="file" id="upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30">
        </div>

        <div id="controls" class="hidden mb-6 text-left bg-blue-50 p-4 rounded-xl">
            <label class="block text-xs font-bold text-gray-600 mb-2 uppercase">🔍 জুম করুন:</label>
            <input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" value="1" class="w-full accent-blue-600">
            <p class="text-[10px] text-blue-400 mt-2 text-center italic">ছবিটি আঙ্গুল দিয়ে টেনে পজিশন ঠিক করুন</p>
        </div>

        <div class="space-y-3">
            <button onclick="document.getElementById('upload').click()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                📸 ছবি নির্বাচন করুন
            </button>
            <button id="download-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg hidden">
                💾 ফ্রেমসহ সেভ করুন
            </button>
        </div>
        <p class="text-[10px] text-gray-400 mt-6 tracking-widest uppercase">Bohoddar Kata High School</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('upload');
        const downloadBtn = document.getElementById('download-btn');
        const zoomSlider = document.getElementById('zoom-slider');
        const downloadModal = document.getElementById('downloadModal');
        const imageContainer = document.getElementById('imageContainer');

        const frameImg = new Image();
        frameImg.src = 'frame.png'; // তোমার ফ্রেম ফাইলের নাম
        
        let userImg = new Image();
        let imgX = 0, imgY = 0, imgScale = 1;
        let isDragging = false, startX, startY;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                userImg.onload = () => {
                    const scaleFit = Math.max(1080 / userImg.width, 1080 / userImg.height);
                    imgScale = scaleFit;
                    imgX = (1080 - userImg.width * imgScale) / 2;
                    imgY = (1080 - userImg.height * imgScale) / 2;
                    zoomSlider.min = scaleFit * 0.5;
                    zoomSlider.max = scaleFit * 3;
                    zoomSlider.value = imgScale;
                    initCanvas();
                };
                userImg.src = f.target.result;
            };
            reader.readAsDataURL(file);
        });

        function initCanvas() {
            canvas.width = 1080; canvas.height = 1080;
            draw();
            canvas.classList.remove('hidden');
            document.getElementById('placeholder-text').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        }

        function draw() {
            ctx.clearRect(0, 0, 1080, 1080);
            ctx.drawImage(userImg, imgX, imgY, userImg.width * imgScale, userImg.height * imgScale);
            ctx.drawImage(frameImg, 0, 0, 1080, 1080);
        }

        // Zoom & Drag Logic
        zoomSlider.oninput = () => {
            const oldS = imgScale; imgScale = parseFloat(zoomSlider.value);
            imgX = 540 - (540 - imgX) * (imgScale / oldS);
            imgY = 540 - (540 - imgY) * (imgScale / oldS);
            draw();
        };

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (1080 / r.width), y: (cy - r.top) * (1080 / r.height) };
        };

        const start = (e) => { isDragging = true; const p = getPos(e); startX = p.x - imgX; startY = p.y - imgY; };
        const move = (e) => { if(!isDragging) return; e.preventDefault(); const p = getPos(e); imgX = p.x - startX; imgY = p.y - startY; draw(); };
        const end = () => isDragging = false;

        canvas.onmousedown = start; window.onmousemove = move; window.onmouseup = end;
        canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = end;

        // Final High Quality Save Fix for FB
        downloadBtn.onclick = () => {
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const isMobileApp = /FBAN|FBAV|Messenger/i.test(navigator.userAgent);

                if (isMobileApp) {
                    const finalImg = new Image();
                    finalImg.src = url;
                    finalImg.className = "w-full rounded-lg shadow-lg";
                    imageContainer.innerHTML = ''; 
                    imageContainer.appendChild(finalImg);
                    downloadModal.style.display = 'flex';
                } else {
                    const a = document.createElement('a');
                    a.download = 'BKHS_Reunion_Profile.png';
                    a.href = url;
                    a.click();
                }
            }, 'image/png', 1.0);
        };

        function closeModal() { downloadModal.style.display = 'none'; }
    </script>
</body>
</html>
