<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKHS Eid Reunion - Frame Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel max-w-lg w-full rounded-3xl shadow-2xl p-8 text-center">
        
        <h1 class="text-3xl font-bold text-gray-800 mb-2">BKHS Eid Reunion <span class="text-blue-600">2026</span></h1>
        <p class="text-gray-500 mb-8">তোমার ছবি আপলোড করো আর দারুণ একটি ফ্রেম তৈরি করো!</p>

        <div class="relative w-full aspect-square bg-gray-100 rounded-2xl overflow-hidden border-2 border-dashed border-gray-300 flex items-center justify-center mb-6 group transition-all hover:border-blue-400">
            <p id="placeholder-text" class="text-gray-400 font-medium z-10">এখানে ছবি দেখা যাবে</p>
            <canvas id="canvas" class="absolute top-0 left-0 w-full h-full hidden"></canvas>
            
            <input type="file" id="upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
        </div>

        <div class="space-y-4">
            <button onclick="document.getElementById('upload').click()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg hover:shadow-blue-500/30">
                📸 ছবি নির্বাচন করুন
            </button>
            
            <button id="download-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg hover:shadow-green-500/30 hidden">
                ⬇️ ফ্রেমসহ ডাউনলোড করুন
            </button>
        </div>
        
        <p class="text-xs text-gray-400 mt-6">Developed for Bohoddar Kata High School</p>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download-btn');
        const placeholderText = document.getElementById('placeholder-text');

        // ফ্রেম ইমেজের নাম ও লোকেশন (তোমার ফোল্ডারে frame.png থাকতে হবে)
        const frameSrc = 'frame.png'; 
        
        // টপ কোয়ালিটির জন্য ক্যানভাসের সাইজ (1080x1080)
        const canvasSize = 1080; 
        canvas.width = canvasSize;
        canvas.height = canvasSize;

        let frameImage = new Image();
        frameImage.src = frameSrc;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const userImage = new Image();
                userImage.onload = () => {
                    // ক্যানভাস ক্লিয়ার করা
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // ছবি যেন চ্যাপ্টা না হয় (Object-fit: cover logic)
                    const scale = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
                    const x = (canvas.width / 2) - (userImage.width / 2) * scale;
                    const y = (canvas.height / 2) - (userImage.height / 2) * scale;

                    // ইউজারের ছবি আঁকা
                    ctx.drawImage(userImage, x, y, userImage.width * scale, userImage.height * scale);

                    // ফ্রেম আঁকা (ইউজারের ছবির উপরে)
                    if (frameImage.complete) {
                        ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
                        showPreviewAndDownload();
                    } else {
                        frameImage.onload = () => {
                            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
                            showPreviewAndDownload();
                        }
                    }
                };
                userImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function showPreviewAndDownload() {
            canvas.classList.remove('hidden');
            placeholderText.classList.add('hidden');
            downloadBtn.classList.remove('hidden');
        }

        downloadBtn.addEventListener('click', () => {
            // টপ কোয়ালিটি ডাউনলোড (PNG)
            const link = document.createElement('a');
            link.download = 'BKHS-Reunion-Profile.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        });
    </script>
</body>
</html>
